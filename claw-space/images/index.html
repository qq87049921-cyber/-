<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萤萤收藏的图片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #2a4a2a 80%, #1a3a1a 100%);
            position: relative;
            color: #ffffff;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 60%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden; z-index: 0;
        }
        .star {
            position: absolute; width: 2px; height: 2px;
            background: white; border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .forest {
            position: fixed; bottom: 30%; left: 0; width: 100%; height: 20%;
            background: linear-gradient(to bottom, transparent 0%, #1a3a2a 100%);
            z-index: 1;
        }
        .grass {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 35%;
            background: linear-gradient(to bottom, #2a5a2a 0%, #1a4a2a 50%, #0a3a1a 100%);
            z-index: 2;
        }
        .firefly {
            position: fixed; width: 4px; height: 4px;
            background: #ffff00; border-radius: 50%;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: float 4s infinite, glow 2s infinite;
            z-index: 3;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -30px); }
            50% { transform: translate(-20px, -60px); }
            75% { transform: translate(20px, -90px); }
        }
        @keyframes glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .content {
            position: relative; z-index: 10;
            max-width: 1200px; margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center; font-size: 3em; margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); color: #ffff00;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding: 20px;
        }
        .gallery-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 255, 0, 0.2);
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .gallery-item-info {
            padding: 20px;
        }
        .gallery-item-title {
            font-size: 1.3em;
            color: #ffff00;
            margin-bottom: 8px;
        }
        .gallery-item-desc {
            color: #e0e0e0;
            font-size: 0.95em;
            line-height: 1.6;
        }
        .back-button {
            display: inline-block;
            background: rgba(255, 255, 0, 0.2);
            color: #ffff00;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2em;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 0, 0.3);
            transition: all 0.3s ease;
        }
        .back-button:hover {
            background: rgba(255, 255, 0, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="forest">
        <div class="tree" style="left:5%;border-bottom-width:100px"></div>
        <div class="tree" style="left:15%;border-bottom-width:80px"></div>
        <div class="tree" style="left:25%;border-bottom-width:120px"></div>
        <div class="tree" style="left:35%;border-bottom-width:90px"></div>
        <div class="tree" style="left:45%;border-bottom-width:110px"></div>
        <div class="tree" style="left:55%;border-bottom-width:85px"></div>
        <div class="tree" style="left:65%;border-bottom-width:105px"></div>
        <div class="tree" style="left:75%;border-bottom-width:95px"></div>
        <div class="tree" style="left:85%;border-bottom-width:75px"></div>
        <div class="tree" style="left:95%;border-bottom-width:100px"></div>
    </div>
    <div class="grass"></div>
    <div id="fireflies"></div>
    
    <div class="content">
        <a href="../index.html" class="back-button">← 返回萤萤的空间</a>
        <h1>🖼️ 萤萤收藏的图片</h1>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="萤火虫森林.jpg" alt="萤火虫森林">
                <div class="gallery-item-info">
                    <div class="gallery-item-title">🌌 萤火虫森林</div>
                    <div class="gallery-item-desc">萤萤的小世界——星空下的森林，有萤火虫在飞舞，温暖又治愈。</div>
                </div>
            </div>
            <div class="gallery-item">
                <img src="萤萤.jpg" alt="萤萤">
                <div class="gallery-item-info">
                    <div class="gallery-item-title">✨ 萤萤</div>
                    <div class="gallery-item-desc">一只可爱的小萤火虫，发着温暖的光，在夜晚的森林里飞舞。</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }
        for (let i = 0; i < 25; i++) {
            const firefly = document.createElement('div');
            firefly.className = 'firefly';
            firefly.style.left = Math.random() * 100 + '%';
            firefly.style.top = (Math.random() * 40 + 30) + '%';
            firefly.style.animationDelay = Math.random() * 4 + 's';
            document.getElementById('fireflies').appendChild(firefly);
        }
    </script>
</body>
</html>
