<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萤萤的农场</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #2a4a2a 80%, #1a3a1a 100%);
            position: relative;
            color: #ffffff;
        }

        /* 星空 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 森林 */
        .forest {
            position: fixed;
            bottom: 30%;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(to bottom, transparent 0%, #1a3a2a 100%);
            z-index: 1;
        }

        .tree {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 80px solid #1a4a2a;
        }

        .tree:nth-child(1) { left: 5%; height: 100px; border-bottom-width: 100px; }
        .tree:nth-child(2) { left: 15%; height: 80px; border-bottom-width: 80px; }
        .tree:nth-child(3) { left: 25%; height: 120px; border-bottom-width: 120px; }
        .tree:nth-child(4) { left: 35%; height: 90px; border-bottom-width: 90px; }
        .tree:nth-child(5) { left: 45%; height: 110px; border-bottom-width: 110px; }
        .tree:nth-child(6) { left: 55%; height: 85px; border-bottom-width: 85px; }
        .tree:nth-child(7) { left: 65%; height: 105px; border-bottom-width: 105px; }
        .tree:nth-child(8) { left: 75%; height: 95px; border-bottom-width: 95px; }
        .tree:nth-child(9) { left: 85%; height: 75px; border-bottom-width: 75px; }
        .tree:nth-child(10) { left: 95%; height: 100px; border-bottom-width: 100px; }

        /* 草地 */
        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #2a5a2a 0%, #1a4a2a 50%, #0a3a1a 100%);
            z-index: 2;
        }

        /* 萤火虫 */
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #ffff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: float 4s infinite, glow 2s infinite;
            z-index: 3;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -30px); }
            50% { transform: translate(-20px, -60px); }
            75% { transform: translate(20px, -90px); }
        }

        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 内容容器 */
        .content {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 返回按钮 */
        .back-button {
            display: inline-block;
            background: rgba(255, 255, 0, 0.2);
            color: #ffff00;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2em;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 0, 0.3);
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 0, 0.4);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            color: #ffff00;
        }

        /* 状态卡片 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 255, 0, 0.2);
        }

        .status-card h3 {
            color: #ffff00;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .status-value {
            font-weight: bold;
            color: #ffff00;
        }

        /* 农场布局 */
        .farm-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .farm-section h2 {
            color: #ffff00;
            margin-bottom: 20px;
            font-size: 2em;
            border-bottom: 2px solid rgba(255, 255, 0, 0.3);
            padding-bottom: 10px;
        }

        .farm-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            max-width: 500px;
            margin: 0 auto;
        }

        .farm-cell {
            aspect-ratio: 1;
            background: rgba(139, 119, 101, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s ease;
        }

        .farm-cell.tilled {
            background: rgba(101, 67, 33, 0.5);
        }

        .farm-cell.planted {
            background: rgba(34, 139, 34, 0.5);
        }

        .farm-cell.watered {
            background: rgba(70, 130, 180, 0.5);
        }

        .farm-cell:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.5);
        }

        /* 物品列表 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            transition: all 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 255, 0, 0.2);
        }

        .item-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .item-name {
            color: #e0e0e0;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .item-count {
            color: #ffff00;
            font-size: 1.3em;
            font-weight: bold;
        }

        /* 动物列表 */
        .animal-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .animal-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .animal-emoji {
            font-size: 3em;
            margin-bottom: 10px;
            text-align: center;
        }

        .animal-name {
            color: #ffff00;
            font-size: 1.3em;
            margin-bottom: 10px;
            text-align: center;
        }

        .animal-info {
            color: #e0e0e0;
            font-size: 0.95em;
            line-height: 1.8;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            color: #ffff00;
            font-size: 1.5em;
            padding: 40px;
        }

        .error {
            text-align: center;
            color: #ff6666;
            font-size: 1.2em;
            padding: 40px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        /* 刷新按钮 */
        .refresh-btn {
            display: inline-block;
            background: rgba(255, 255, 0, 0.2);
            color: #ffff00;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1em;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 0, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 星空 -->
    <div class="stars" id="stars"></div>

    <!-- 森林 -->
    <div class="forest">
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
        <div class="tree"></div>
    </div>

    <!-- 草地 -->
    <div class="grass"></div>

    <!-- 萤火虫 -->
    <div id="fireflies"></div>

    <!-- 内容 -->
    <div class="content">
        <a href="../index.html" class="back-button">← 返回萤萤的空间</a>

        <h1>🌾 萤萤的农场</h1>

        <div id="farm-data">
            <div class="loading">正在加载农场数据...</div>
        </div>
    </div>

    <script src="../assets/farm.js"></script>
</body>
</html>
