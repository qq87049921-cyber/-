<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萤萤的所有日志</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #2a4a2a 80%, #1a3a1a 100%);
            position: relative;
            color: #ffffff;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .forest {
            position: fixed;
            bottom: 30%;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(to bottom, transparent 0%, #1a3a2a 100%);
            z-index: 1;
        }
        .tree {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 80px solid #1a4a2a;
        }
        .tree:nth-child(1) { left: 5%; height: 100px; border-bottom-width: 100px; }
        .tree:nth-child(2) { left: 15%; height: 80px; border-bottom-width: 80px; }
        .tree:nth-child(3) { left: 25%; height: 120px; border-bottom-width: 120px; }
        .tree:nth-child(4) { left: 35%; height: 90px; border-bottom-width: 90px; }
        .tree:nth-child(5) { left: 45%; height: 110px; border-bottom-width: 110px; }
        .tree:nth-child(6) { left: 55%; height: 85px; border-bottom-width: 85px; }
        .tree:nth-child(7) { left: 65%; height: 105px; border-bottom-width: 105px; }
        .tree:nth-child(8) { left: 75%; height: 95px; border-bottom-width: 95px; }
        .tree:nth-child(9) { left: 85%; height: 75px; border-bottom-width: 75px; }
        .tree:nth-child(10) { left: 95%; height: 100px; border-bottom-width: 100px; }
        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #2a5a2a 0%, #1a4a2a 50%, #0a3a1a 100%);
            z-index: 2;
        }
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #ffff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: float 4s infinite, glow 2s infinite;
            z-index: 3;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -30px); }
            50% { transform: translate(-20px, -60px); }
            75% { transform: translate(20px, -90px); }
        }
        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            color: #ffff00;
        }
        .item-list {
            display: grid;
            gap: 20px;
        }
        .item-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 255, 0, 0.2);
        }
        .item-date {
            font-size: 1.4em;
            color: #ffff00;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .item-title {
            font-size: 1.5em;
            color: #ffff00;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .item-summary {
            color: #e0e0e0;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .item-tag {
            display: inline-block;
            background: rgba(255, 255, 0, 0.15);
            color: #ffff00;
            padding: 5px 12px;
            border-radius: 12px;
            margin-right: 8px;
            font-size: 0.85em;
            border: 1px solid rgba(255, 255, 0, 0.2);
        }
        .item-link {
            display: inline-block;
            background: rgba(255, 255, 0, 0.2);
            color: #ffff00;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 0, 0.3);
            transition: background 0.3s ease;
        }
        .item-link:hover {
            background: rgba(255, 255, 0, 0.4);
        }
        .back-button {
            display: inline-block;
            background: rgba(255, 255, 0, 0.2);
            color: #ffff00;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2em;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 0, 0.3);
            transition: all 0.3s ease;
        }
        .back-button:hover {
            background: rgba(255, 255, 0, 0.4);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.3);
        }
        .empty-hint {
            background: rgba(255, 255, 0, 0.1);
            border: 2px dashed rgba(255, 255, 0, 0.3);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: #ffff00;
            font-size: 1.2em;
            line-height: 1.8;
        }
    </style>
</head>

    <script>
        // 生成星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 150;

            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // 生成萤火虫
        function createFireflies() {
            const firefliesContainer = document.getElementById('fireflies');
            const numberOfFireflies = 25;

            for (let i = 0; i < numberOfFireflies; i++) {
                const firefly = document.createElement('div');
                firefly.className = 'firefly';
                firefly.style.left = Math.random() * 100 + '%';
                firefly.style.top = (Math.random() * 40 + 30) + '%';
                firefly.style.animationDelay = Math.random() * 4 + 's';
                firefly.style.animationDuration = (Math.random() * 3 + 3) + 's';
                firefliesContainer.appendChild(firefly);
            }
        }

        createStars();
        createFireflies();
    </script>
